<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Event - Celeb Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="StyleSheet_User.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-pink" href="Main_Menu.html">
            <i class="fas fa-arrow-left me-2"></i> BACK TO FEED
        </a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-5 overflow-hidden">
                <img id="displayImg" src="" class="w-100" style="height: 300px; object-fit: cover;">
                
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <h2 class="fw-bold mb-1" id="displayTitle">Event Title</h2>
                            <span class="badge bg-soft-pink text-pink rounded-pill" id="displayType">Public Event</span>
                        </div>
                        <div class="text-end">
                            <h4 class="text-pink fw-bold mb-0" id="displayDate">---</h4>
                            <small class="text-muted" id="displayTime">---</small>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center p-3 border rounded-4 bg-white">
                                <i class="fas fa-user-circle fa-2x text-pink me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Host</small>
                                    <strong id="displayHost">---</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="d-flex align-items-center p-3 border rounded-4 bg-white">
                                <i class="fas fa-map-marker-alt fa-2x text-pink me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Venue</small>
                                    <strong id="displayVenue">---</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex align-items-center p-3 border rounded-4 bg-white">
                                <i class="fas fa-venus-mars text-pink me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Gender</small>
                                    <strong id="displayGender">---</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex align-items-center p-3 border rounded-4 bg-white">
                                <i class="fas fa-users text-pink me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Guest Limit</small>
                                    <strong id="displayLimit">---</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex align-items-center p-3 border rounded-4 bg-white">
                                <i class="fas fa-palette text-pink me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Theme</small>
                                    <strong id="displayTheme">---</strong>
                                </div>
                            </div>
                        </div>
                    </div>

<div class="mb-5 p-4 border rounded-4 bg-light">
    <h6 class="fw-bold text-pink mb-2"><i class="fas fa-info-circle me-2"></i>About this Event</h6>
    <p id="displayDesc" class="text-muted mb-0" style="line-height: 1.6;">No description provided.</p>
</div>

<div class="d-flex gap-3 mb-5">
    <button class="btn btn-outline-secondary w-50 py-3 rounded-pill fw-bold" 
            data-bs-toggle="modal" data-bs-target="#declineModal">DECLINE</button>
    <button class="btn btn-pink w-50 py-3 rounded-pill fw-bold shadow-sm" 
            data-bs-toggle="modal" data-bs-target="#acceptModal">ACCEPT</button>
</div>

<div class="modal fade" id="declineModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-5 border-0">
            <div class="modal-header border-0 px-4 pt-4">
                <h5 class="fw-bold text-secondary">Can't attend?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="declineForm">
                    <label class="form-label small fw-bold">Reason for declining</label>
                    <select class="form-select rounded-pill p-3 mb-3" required>
                        <option value="">Select a reason</option>
                        <option>Schedule Conflict</option>
                        <option>Distance/Travel Issues</option>
                        <option>Personal Reasons</option>
                        <option>Not interested</option>
                    </select>
                    <label class="form-label small fw-bold">Extra Explanation (Optional)</label>
                    <textarea class="form-control rounded-4 mb-4" id="declineNote" rows="3" placeholder="Tell us more..."></textarea>
                    <button type="submit" class="btn btn-outline-danger w-100 py-3 rounded-pill fw-bold">SUBMIT DECLINE</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="acceptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-5 border-0 shadow-lg">
            <div class="modal-header border-0 px-4 pt-4">
                <h5 class="fw-bold mb-0 text-pink">Join the Celebration</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="rsvpFinalForm">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Participant Name</label>
                            <input type="text" class="form-control rounded-pill p-3" placeholder="Full Name" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Gender</label>
                            <select class="form-select rounded-pill p-3">
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Age</label>
                            <input type="number" class="form-control rounded-pill p-3" required>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Arrival Time (Optional)</label>
                            <input type="time" class="form-control rounded-pill p-3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">How many guests?</label>
                            <input type="number" id="guestCountInput" class="form-control rounded-pill p-3" value="0" min="0" oninput="updateGuestNames()">
                        </div>
                    </div>
                    <div id="guestListContainer" class="row g-2 mb-4"></div>
                    <button type="submit" class="btn btn-pink w-100 py-3 rounded-pill fw-bold">CONFIRM RSVP</button>
                </form>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="User_Script.js"></script>

</body>
</html>
